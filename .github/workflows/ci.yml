name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          bash -n index.sh
          bash -n install.sh

      - name: ShellCheck
        run: shellcheck index.sh install.sh

  alpine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Alpine compatibility check
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace alpine:3.21 sh -c '
            apk add --no-cache bash openrc
            bash -n index.sh
            bash -n install.sh
            bash -c '"'"'
              sed "\$d" index.sh > /tmp/index-functions.sh
              source /tmp/index-functions.sh
              detect_pkg_manager
              test "$PKG_MANAGER" = "apk"
              test "$(sing_box_service_manager)" = "openrc"
              test "$(realm_service_manager)" = "openrc"
              test "$(detect_realm_arch)" = "x86_64-unknown-linux-musl"
              REALM_OPENRC_SERVICE_FILE=/tmp/realm
              REALM_OPENRC_LOG_FILE=/tmp/realm.log
              ensure_realm_service
              test -x "$REALM_OPENRC_SERVICE_FILE"
              bash -n "$REALM_OPENRC_SERVICE_FILE"
              grep -q "^command_background=\"yes\"$" "$REALM_OPENRC_SERVICE_FILE"
            '"'"'
          '
